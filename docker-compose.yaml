version: "3.4"
services:
  xdit:
    # image: rocm/pytorch:rocm7.1_ubuntu22.04_py3.10_pytorch_release_2.9.1
    image: amdsiloai/pytorch-xdit:v25.13.1
    # container_name: "${USER}-xdit"
    container_name: "anguyenh-xdit"
    shm_size: '128G'
    ipc: "host"
    cap_add:
      - SYS_PTRACE
    devices:
      - /dev/kfd
      - /dev/dri
    network_mode: "host"
    security_opt:
      - "seccomp=unconfined"
    user: root
    group_add:
      - video
    hostname: "xdit-${HOSTNAME:-local}"
    volumes:
      - type: bind
        source: "${HOME}"
        target: "/workspace"
      - "local-files:/var/${USER}"
      - "/tmp/.X11-unix:/tmp/.X11-unix"
      - "/etc/apt:/etc/apt"
      - "/mnt/m2m_nobackup:/mnt/m2m_nobackup"
    working_dir: /workspace/aiter
    entrypoint: ["tail", "-f", "/dev/null"]
    environment:
      - CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7
volumes:
  local-files:
